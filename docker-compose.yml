services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatenko
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT_BINDING}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatenko"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DF_PORT: 3000
      AUTH_PORT: 4000
      FRONTEND_URLS: http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "3000:3000"

  auth:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:auth
    environment:
      DF_PORT: 3000
      AUTH_PORT: 4000
      FRONTEND_URLS: http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_APP_DF_PORT: http://localhost:3000
        VITE_APP_AUTH_PORT: http://localhost:4000
    depends_on:
      - backend
      - auth
    ports:
      - "8080:80"

volumes:
  postgres_data:
